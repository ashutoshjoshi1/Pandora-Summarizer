<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pandora Fleet{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◐</span>
      <span class="brand-text">PANDORA · FLEET</span>
    </div>
    <nav>
      <a href="{{ url_for('fleet.fleet_overview') }}">Fleet</a>
      <a href="{{ url_for('reports.daily_report') }}">Daily report</a>
    </nav>
    <div class="meta">
      <span class="meta-label">bucket</span>
      <code>gs://{{ bucket_name }}/{{ bucket_prefix }}</code>
    </div>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Read-only. Summaries built locally on each Pandora instrument.</span>
  </footer>
</body>
</html>
